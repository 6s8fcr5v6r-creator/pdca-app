<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>問題解決型ストーリーフォーマット</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --plan:#3B82F6;--do:#10B981;--check:#F59E0B;--act:#EF4444;
  --g50:#F9FAFB;--g100:#F3F4F6;--g200:#E5E7EB;--g300:#D1D5DB;
  --g500:#6B7280;--g600:#4B5563;--g700:#374151;--g800:#1F2937;
}
body{font-family:'Hiragino Kaku Gothic ProN','Meiryo',sans-serif;background:var(--g100);color:var(--g800);font-size:14px;line-height:1.6}
.app{display:flex;min-height:100vh}

/* Sidebar */
.sidebar{width:240px;background:#fff;border-right:1px solid var(--g200);position:fixed;top:0;left:0;height:100vh;overflow-y:auto;z-index:100;display:flex;flex-direction:column}
.sidebar-logo{padding:16px;border-bottom:1px solid var(--g200)}
.sidebar-logo h1{font-size:13px;font-weight:700;line-height:1.4;color:var(--g800)}
.sidebar-logo .subtitle{font-size:11px;color:var(--g500);margin-top:2px}
.nav-section{padding:12px 16px 4px;font-size:10px;font-weight:700;color:var(--g500);text-transform:uppercase;letter-spacing:.08em}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 16px;cursor:pointer;border-left:3px solid transparent;font-size:13px;color:var(--g700);transition:all .15s;text-decoration:none}
.nav-item:hover{background:var(--g50)}
.nav-item.active{background:var(--g50);font-weight:600;color:var(--plan);border-left-color:var(--plan)}
.nav-item.active.do{color:var(--do);border-left-color:var(--do)}
.nav-item.active.check{color:var(--check);border-left-color:var(--check)}
.nav-item.active.act{color:var(--act);border-left-color:var(--act)}
.nav-dot{width:22px;height:22px;border-radius:50%;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;background:var(--g200);color:var(--g600);flex-shrink:0}
.nav-dot.done{background:#D1FAE5;color:#065F46}
.sidebar-footer{padding:12px 16px;border-top:1px solid var(--g200);margin-top:auto}
.save-indicator{font-size:11px;color:var(--g500);text-align:center}

/* Main */
.main{margin-left:240px;padding:24px;min-height:100vh;max-width:calc(100vw - 240px)}

/* Page Header */
.page-hdr{display:flex;align-items:flex-start;gap:14px;margin-bottom:20px}
.page-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.page-icon.plan{background:#EFF6FF}.page-icon.do{background:#ECFDF5}.page-icon.check{background:#FFFBEB}.page-icon.act{background:#FEF2F2}
.page-hdr-info .step-no{font-size:11px;color:var(--g500);margin-bottom:2px;font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.page-hdr-info h2{font-size:21px;font-weight:700}
.page-hdr-info .step-sub{font-size:13px;color:var(--g600);margin-top:2px}

/* Guide Box */
.guide{background:#FFFBEB;border:1px solid #FDE68A;border-radius:8px;padding:14px 16px;margin-bottom:16px}
.guide-title{font-size:12px;font-weight:700;color:#92400E;margin-bottom:6px;display:flex;align-items:center;gap:5px}
.guide p,.guide li{font-size:13px;color:#78350F;line-height:1.65}
.guide ul{padding-left:18px}

/* Example Toggle */
.ex-toggle{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;background:#FFFBEB;border:1px solid #FDE68A;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;color:#92400E;margin-bottom:10px;user-select:none}
.ex-box{background:#FFFBEB;border:1px solid #FDE68A;border-radius:8px;padding:14px;margin-bottom:14px;display:none}
.ex-box.show{display:block}
.ex-box .ex-ttl{font-size:11px;font-weight:700;color:#92400E;margin-bottom:10px}
/* Mock input fields inside example boxes */
.ex-field{display:block;background:#fff8dc;border:1px solid #F59E0B;border-radius:5px;padding:6px 9px;font-size:12px;color:#374151;line-height:1.5;min-height:32px}
.ex-textarea{display:block;background:#fff8dc;border:1px solid #F59E0B;border-radius:5px;padding:6px 9px;font-size:12px;color:#374151;line-height:1.5;min-height:52px}
.ex-label{font-size:10px;font-weight:700;color:#92400E;text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px;margin-top:8px;display:block}
.ex-label:first-child{margin-top:0}
.ex-num{display:inline-block;background:#fff8dc;border:1px solid #F59E0B;border-radius:5px;padding:4px 8px;font-size:13px;font-weight:700;color:#374151;min-width:56px;text-align:center}

/* Cards */
.card{background:#fff;border-radius:10px;padding:18px;margin-bottom:14px;border:1px solid var(--g200)}
.card-title{font-size:14px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:7px}
.card-title .badge{width:22px;height:22px;border-radius:50%;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;background:var(--plan);color:#fff;flex-shrink:0}

/* Step Meta */
.meta-row{display:grid;grid-template-columns:1fr 1fr 2fr;gap:10px;margin-bottom:16px}
.meta-item label{display:block;font-size:11px;font-weight:700;color:var(--g500);margin-bottom:3px;text-transform:uppercase;letter-spacing:.05em}

/* Task Meta Bar */
.task-meta-bar{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--g50);border-radius:7px;margin-bottom:14px;flex-wrap:wrap;border:1px solid var(--g200)}
.task-meta-bar .tm-label{font-size:10px;font-weight:700;color:var(--g500);text-transform:uppercase;letter-spacing:.05em;white-space:nowrap}
.task-meta-bar .tm-item{display:flex;flex-direction:column;flex:1;min-width:90px}
.task-meta-bar .tm-item.wide{flex:2;min-width:140px}
.task-meta-bar .tm-item label{font-size:10px;font-weight:700;color:var(--g500);margin-bottom:2px;text-transform:uppercase;letter-spacing:.05em}
.task-meta-bar .tm-item input{padding:5px 8px;font-size:12px;width:100%}

/* Form Elements */
input[type=text],input[type=date],input[type=number],textarea,select{
  width:100%;padding:7px 10px;border:1px solid var(--g300);border-radius:6px;
  font-size:13px;font-family:inherit;color:var(--g800);background:#fff;outline:none;transition:border-color .15s}
input:focus,textarea:focus,select:focus{border-color:var(--plan);box-shadow:0 0 0 3px rgba(59,130,246,.1)}
textarea{resize:vertical;min-height:64px}

/* Buttons */
.btn{padding:7px 14px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .15s;display:inline-flex;align-items:center;gap:5px;font-family:inherit}
.btn-primary{background:var(--plan);color:#fff}.btn-primary:hover{background:#2563EB}
.btn-success{background:var(--do);color:#fff}.btn-success:hover{background:#059669}
.btn-outline{background:#fff;color:var(--g700);border:1px solid var(--g300)}.btn-outline:hover{background:var(--g50)}
.btn-danger{background:#fff;color:#EF4444;border:1px solid #FECACA}.btn-danger:hover{background:#FEF2F2}
.btn-sm{padding:4px 10px;font-size:12px}
.btn-xs{padding:2px 8px;font-size:11px}

/* Step Navigation */
.step-nav{display:flex;justify-content:space-between;align-items:center;margin-top:20px;padding-top:16px;border-top:1px solid var(--g200)}
.complete-toggle{display:flex;align-items:center;gap:8px;font-size:13px}
.complete-toggle input[type=checkbox]{width:18px;height:18px;accent-color:var(--do);cursor:pointer}

/* Tables */
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{background:var(--g50);padding:9px 10px;text-align:left;font-weight:700;font-size:12px;color:var(--g600);border-bottom:2px solid var(--g200)}
.tbl td{padding:7px 10px;border-bottom:1px solid var(--g100);vertical-align:middle}
.tbl tr:hover td{background:var(--g50)}
.tbl tr.top-row td{background:#FFFBEB}

/* Symbol selector */
.sym-sel{display:flex;gap:3px}
.sym-btn{width:30px;height:30px;border-radius:5px;border:1.5px solid var(--g300);background:#fff;cursor:pointer;font-size:13px;transition:all .15s;display:flex;align-items:center;justify-content:center}
.sym-btn:hover{border-color:var(--plan)}
.sym-btn.s-x{border-color:#EF4444;background:#FEF2F2;font-weight:700}
.sym-btn.s-△{border-color:#F59E0B;background:#FFFBEB;font-weight:700}
.sym-btn.s-○{border-color:#10B981;background:#ECFDF5;font-weight:700}
.sym-btn.s-◎{border-color:#3B82F6;background:#EFF6FF;font-weight:700}

/* Score badge */
.score{display:inline-flex;align-items:center;justify-content:center;min-width:34px;height:26px;border-radius:13px;font-weight:700;font-size:13px;padding:0 7px}
.score-h{background:#FEF3C7;color:#92400E}
.score-m{background:#D1FAE5;color:#065F46}
.score-l{background:var(--g100);color:var(--g600)}

/* Duplicate error (Step01) */
.tbl th.dup-err{background:#FEF2F2;color:#991B1B}
.sym-btn.dup-sym{outline:2.5px solid #EF4444;outline-offset:1px}
.dup-alert{background:#FEF2F2;border:1.5px solid #FECACA;border-radius:8px;padding:10px 14px;margin-bottom:12px;font-size:13px;color:#991B1B;display:flex;align-items:flex-start;gap:8px}
.dup-alert b{display:block;margin-bottom:2px}

/* Top problem card (Step01) */
.top-prob-card{background:linear-gradient(135deg,#FFFBEB,#FEF3C7);border:2px solid #F59E0B;border-radius:14px;padding:20px;margin-top:14px}
.top-prob-label{font-size:11px;font-weight:700;color:#92400E;text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.top-prob-inner{display:flex;align-items:center;gap:18px}
.top-prob-score{width:60px;height:60px;border-radius:50%;background:#F59E0B;color:#fff;font-size:24px;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 4px 12px rgba(245,158,11,.35)}
.top-prob-title{font-size:22px;font-weight:800;color:#78350F;line-height:1.3;margin-bottom:5px}
.top-prob-data{font-size:13px;color:#92400E;margin-bottom:6px}
.top-prob-syms{display:flex;gap:8px;flex-wrap:wrap}
.top-prob-sym{font-size:12px;font-weight:700;padding:2px 10px;border-radius:20px;background:#fff;border:1px solid #FDE68A;color:#92400E}

/* Step03 tree */
.tnode-container{display:flex;flex-direction:column;gap:6px}
.tnode-group{margin-bottom:2px}
.tnode{display:flex;align-items:center;gap:5px;padding:6px 8px;border-radius:6px;border:1px solid var(--g200)}
.tnode.l1{background:var(--g50);border-color:var(--g300)}
.tnode.l2{background:#EFF6FF;border-color:#BFDBFE;margin-left:18px}
.tnode.l3{background:#F0FDF4;border-color:#86EFAC;margin-left:36px}
.tnode-children{margin-top:4px;display:flex;flex-direction:column;gap:4px}
.lvl-badge{padding:1px 6px;border-radius:4px;font-size:10px;font-weight:800;flex-shrink:0;letter-spacing:.02em}
.lv1{background:#DBEAFE;color:#1D4ED8}.lv2{background:#EDE9FE;color:#5B21B6}.lv3{background:#D1FAE5;color:#065F46}
.tnode input[type=number]{width:68px;padding:5px 7px;font-size:12px}
.tnode input[type=text]{padding:5px 8px;font-size:12px}

/* Step03 flow indicator */
.s03-flow{display:flex;align-items:stretch;background:#fff;border:1px solid var(--g200);border-radius:10px;overflow:hidden;margin-bottom:16px}
.s03-flow-step{flex:1;padding:10px 8px;text-align:center;border-right:1px solid var(--g200)}
.s03-flow-step:last-child{border-right:none}
.s03-flow-step.done-step{background:#ECFDF5}
.s03-flow-step.active-step{background:#EFF6FF}
.s03-flow-num{width:24px;height:24px;border-radius:50%;background:var(--g300);color:#fff;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;margin:0 auto 4px}
.s03-flow-num.done{background:var(--do)}
.s03-flow-num.active{background:var(--plan)}
.s03-flow-lbl{font-size:12px;font-weight:700;color:var(--g700)}
.s03-flow-sub{font-size:10px;color:var(--g500);margin-top:1px}
/* L1 card */
.l1-card{background:#fff;border:2px solid #93C5FD;border-radius:12px;margin-bottom:12px}
.l1-card-hdr{background:#EFF6FF;border-radius:10px 10px 0 0;padding:10px 14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.l1-card-hdr .l1-inputs{display:flex;gap:6px;flex:1;align-items:center;min-width:200px}
.l1-card-body{padding:12px 14px}
.l1-connect{display:flex;align-items:center;gap:6px;margin-bottom:8px;font-size:11px;color:#3B82F6;font-weight:600}
.l1-connect::before{content:'';width:18px;border-top:2px dashed #93C5FD}
/* L2 card */
.l2-card{background:#F5F3FF;border:1.5px solid #C4B5FD;border-radius:8px;margin-bottom:8px}
.l2-card-hdr{background:#EDE9FE;border-radius:6px 6px 0 0;padding:8px 12px;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.l2-card-hdr .l2-inputs{display:flex;gap:5px;flex:1;align-items:center;min-width:160px}
.l2-card-body{padding:8px 12px}
.l2-connect{display:flex;align-items:center;gap:5px;margin-bottom:6px;font-size:10px;color:#7C3AED;font-weight:600}
.l2-connect::before{content:'';width:14px;border-top:2px dashed #C4B5FD}
/* L3 row */
.l3-row{display:flex;align-items:center;gap:5px;background:#ECFDF5;border:1px solid #6EE7B7;border-radius:6px;padding:6px 10px;margin-bottom:5px}
/* Add buttons */
.level-add-btn{width:100%;padding:8px 12px;border:2px dashed var(--g300);border-radius:7px;background:transparent;cursor:pointer;color:var(--g500);font-size:12px;font-family:inherit;font-weight:600;transition:all .15s;text-align:left}
.level-add-btn:hover{border-color:var(--plan);color:var(--plan);background:#EFF6FF}
.level-add-btn.l2-add{border-color:#C4B5FD;color:#7C3AED}.level-add-btn.l2-add:hover{background:#EDE9FE}
.level-add-btn.l3-add{border-color:#6EE7B7;color:#065F46}.level-add-btn.l3-add:hover{background:#ECFDF5}
/* Chart */
.chart-area{overflow-x:auto;min-height:80px;padding:4px 0}
.chart-empty{color:var(--g500);font-size:13px;padding:24px 0;text-align:center}
.chart-level-section{margin-bottom:4px}
.chart-level-hdr{display:flex;align-items:center;gap:7px;margin-bottom:8px}
.chart-level-hdr .clvl-badge{padding:2px 8px;border-radius:4px;font-size:11px;font-weight:800;letter-spacing:.02em}
.clvl1{background:#DBEAFE;color:#1D4ED8}
.clvl2{background:#EDE9FE;color:#5B21B6}
.clvl3{background:#D1FAE5;color:#065F46}
.chart-level-hdr .clvl-title{font-size:13px;font-weight:700;color:var(--g700)}
.chart-level-hdr .clvl-sub{font-size:11px;color:var(--g500);margin-left:4px}
.chart-level-arrow{text-align:center;padding:6px 0;font-size:12px;color:var(--g500);display:flex;align-items:center;gap:6px;justify-content:center}
.chart-level-arrow::before,.chart-level-arrow::after{content:'';flex:1;border-top:1px dashed var(--g300)}
.shinin-candidate{margin-top:10px;background:linear-gradient(135deg,#FEF3C7,#FFFBEB);border:2px solid #F59E0B;border-radius:10px;padding:12px 16px;text-align:center;font-size:14px;font-weight:700;color:#92400E}
.shinin-candidate .sc-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:#B45309;margin-bottom:4px}
.shinin-candidate .sc-name{font-size:17px;font-weight:800;color:#78350F;margin-top:2px}
/* S04 starred candidates + evidence wizard */
.starred-list{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.starred-chip{display:flex;align-items:center;gap:8px;background:#FEF3C7;border:1.5px solid #F59E0B;border-radius:8px;padding:8px 12px;cursor:pointer;transition:all .15s}
.starred-chip:hover{background:#FDE68A}
.starred-chip.active-cause{background:#FDE68A;border-color:#D97706;border-width:2px}
.starred-chip .sc-why{font-size:10px;font-weight:700;color:#92400E;flex-shrink:0;background:#F59E0B;color:#fff;padding:1px 5px;border-radius:3px}
.starred-chip .sc-txt{font-size:13px;font-weight:600;color:#78350F;flex:1}
.starred-chip .sc-set{font-size:11px;color:#059669;font-weight:700;flex-shrink:0}
.evid-wizard{background:#F0F9FF;border:1.5px solid #7DD3FC;border-radius:10px;padding:14px}
.evid-methods{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.evid-method-btn{padding:6px 12px;border-radius:20px;border:1.5px solid var(--g300);background:#fff;cursor:pointer;font-size:12px;font-weight:600;font-family:inherit;transition:all .15s;color:var(--g700)}
.evid-method-btn:hover{border-color:#7DD3FC;background:#E0F2FE}
.evid-method-btn.selected{border-color:#0284C7;background:#0284C7;color:#fff}
.evid-row{display:grid;grid-template-columns:auto 1fr;gap:6px 10px;align-items:center;margin-bottom:8px}
.evid-row label{font-size:11px;font-weight:700;color:#0369A1;white-space:nowrap}
.evid-preview{margin-top:10px;background:#fff;border:1.5px solid #38BDF8;border-radius:8px;padding:10px 12px;font-size:13px;font-weight:600;color:#0C4A6E;line-height:1.6;min-height:44px}
.evid-preview .evid-preview-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#0369A1;margin-bottom:3px}

/* Gap Analysis */
.gap-grid{display:grid;grid-template-columns:1fr auto 1fr;gap:12px;align-items:center}
.gap-box{background:var(--g50);border:1px solid var(--g200);border-radius:8px;padding:12px}
.gap-box.ideal{border-color:#93C5FD;background:#EFF6FF}
.gap-box.current{border-color:#86EFAC;background:#ECFDF5}
.gap-label{font-size:11px;font-weight:700;color:var(--g600);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
.gap-arrow{text-align:center;color:var(--g400);font-size:24px}
.theme-box{background:linear-gradient(135deg,#EFF6FF,#F0FDF4);border:2px solid #93C5FD;border-radius:12px;padding:18px;text-align:center;margin-top:12px}
.theme-box .t-lbl{font-size:11px;font-weight:700;color:var(--g500);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px}
.theme-box .t-text{font-size:18px;font-weight:700;color:var(--g800);min-height:28px}

/* Tree (03, 04, 06) */
.tree-col{background:var(--g50);border:1px solid var(--g200);border-radius:8px;margin-bottom:10px;overflow:hidden}
.tree-col-hdr{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--g100);border-bottom:1px solid var(--g200)}
.tree-num{width:26px;height:26px;border-radius:50%;background:var(--plan);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.tree-body{padding:10px 14px}
.tree-item{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.tree-dot{width:5px;height:5px;border-radius:50%;background:var(--g400);flex-shrink:0}
.imp-btn{padding:2px 9px;border-radius:20px;border:1px solid var(--g300);font-size:11px;cursor:pointer;background:#fff;transition:all .15s;flex-shrink:0}
.imp-btn.on{background:#FEF3C7;border-color:#F59E0B;color:#92400E;font-weight:700}

/* 4M1E */
.m4e1{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
.m4e1-col{background:var(--g50);border:1px solid var(--g200);border-radius:8px;overflow:hidden}
.m4e1-hdr{padding:8px;text-align:center;font-weight:700;font-size:12px;background:var(--g100);border-bottom:1px solid var(--g200)}
.m4e1-body{padding:8px}
.m4e1-item{display:flex;gap:4px;margin-bottom:5px;align-items:center}
.m4e1-item input{padding:4px 7px;font-size:12px}

/* 4M1E tree sections (S04, S06) */
.m4e1-tree{display:flex;flex-direction:column;gap:12px}
.m4e1-section{border-radius:10px;overflow:hidden;border:1.5px solid var(--g200)}
.m4e1-section-hdr{display:flex;align-items:center;gap:8px;padding:10px 14px;font-weight:700;font-size:13px;background:var(--g50);border-bottom:1px solid var(--g200)}
.m4e1-section-hdr .cat-icon{font-size:18px;flex-shrink:0}
.m4e1-section-hdr .cat-name{flex:1}
.m4e1-section-body{padding:10px 14px;background:#fff;display:flex;flex-direction:column;gap:6px}
.m4e1-section-empty{color:var(--g500);font-size:12px;padding:6px 0;text-align:center}

/* Goal Setting */
.goal-grid{display:grid;grid-template-columns:auto 1fr;gap:0}
.goal-label{padding:10px 14px;background:var(--g50);border:1px solid var(--g200);font-weight:700;font-size:13px;display:flex;align-items:center}
.goal-input{padding:8px;border:1px solid var(--g200);border-left:none}

/* Merit/Demerit table */
.cm-tbl{width:100%;border-collapse:collapse;font-size:13px}
.cm-tbl th,.cm-tbl td{border:1px solid var(--g200);padding:8px 10px;vertical-align:top}
.cm-tbl th{background:var(--g50);font-weight:700;font-size:12px;color:var(--g600);text-align:center}
.eval-sel{display:flex;gap:3px;justify-content:center}
.eval-btn{width:26px;height:26px;border-radius:4px;border:1px solid var(--g300);background:#fff;cursor:pointer;font-size:11px;transition:all .15s;font-weight:700}
.eval-btn.e-◎{background:#EFF6FF;border-color:#3B82F6}
.eval-btn.e-○{background:#ECFDF5;border-color:#10B981}
.eval-btn.e-△{background:#FFFBEB;border-color:#F59E0B}
.eval-btn.e-×{background:#FEF2F2;border-color:#EF4444}
/* Evaluation Matrix */
.cm-matrix{width:100%;border-collapse:collapse;font-size:12px}
.cm-matrix th,.cm-matrix td{border:1px solid var(--g200);padding:6px 8px;vertical-align:middle;text-align:center}
.cm-matrix th{background:var(--g50);font-weight:700;font-size:11px;color:var(--g600)}
.cm-matrix .td-left{text-align:left;min-width:130px}
.cm-matrix .td-crit{min-width:62px}
.cm-matrix .score-btns{display:flex;gap:2px;justify-content:center;flex-wrap:wrap}
.score-btn{width:24px;height:24px;border-radius:4px;border:1px solid var(--g300);background:#fff;cursor:pointer;font-size:11px;font-weight:700;transition:all .15s;padding:0;display:inline-flex;align-items:center;justify-content:center}
.score-btn.sel-◎{background:#EFF6FF;border-color:#3B82F6;color:#1D4ED8}
.score-btn.sel-○{background:#ECFDF5;border-color:#10B981;color:#065F46}
.score-btn.sel-△{background:#FFFBEB;border-color:#F59E0B;color:#92400E}
.score-btn.sel-×{background:#FEF2F2;border-color:#EF4444;color:#991B1B}
.total-score{font-weight:700;font-size:14px;color:var(--g800)}
.cm-matrix tr.top-row{background:#FFFBEB}
.cm-matrix tr.top-row td{border-color:#F59E0B}
.cm-matrix tr.chosen-row{background:#ECFDF5}
.cm-matrix tr.chosen-row td{border-color:#10B981}
.chosen-badge{display:inline-block;background:#10B981;color:#fff;font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;margin-left:4px}
.tree-badge{display:inline-block;background:#EFF6FF;color:#1D4ED8;font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;margin-left:3px}

/* Before/After */
.ba-grid{display:grid;grid-template-columns:1fr auto 1fr;gap:12px;align-items:center;background:var(--g50);border-radius:8px;padding:14px}
.ba-box{background:#fff;border-radius:8px;padding:10px;border:1px solid var(--g200);min-height:70px}
.ba-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;color:var(--g600)}
.goal-badge{padding:8px 20px;border-radius:8px;font-weight:700;font-size:14px;text-align:center;margin-top:8px}
.badge-yes{background:#D1FAE5;color:#065F46}
.badge-no{background:#FEE2E2;color:#991B1B}
.badge-none{background:var(--g100);color:var(--g600);font-weight:400;font-size:13px}

/* KPT */
.kpt-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.kpt-card{border-radius:8px;padding:14px}
.kpt-keep{background:#ECFDF5;border:1px solid #86EFAC}
.kpt-prob{background:#FEF2F2;border:1px solid #FECACA}
.kpt-try{background:#EFF6FF;border:1px solid #93C5FD}
.kpt-lbl{font-size:22px;font-weight:900;margin-bottom:6px}
.kpt-keep .kpt-lbl{color:#065F46}.kpt-prob .kpt-lbl{color:#991B1B}.kpt-try .kpt-lbl{color:#1D4ED8}
.kpt-sublbl{font-size:11px;color:var(--g600);margin-bottom:8px}

/* 5W1H table */
.w5h1{width:100%;border-collapse:collapse}
.w5h1 td{padding:7px 10px;border:1px solid var(--g200);vertical-align:top}
.w5h1 td:first-child{width:80px;font-weight:700;background:var(--g50);color:var(--g600);font-size:12px;text-align:center}

/* Dashboard */
.dash-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.dash-card{background:#fff;border:1px solid var(--g200);border-radius:12px;padding:15px;cursor:pointer;transition:all .15s;border-left:4px solid var(--g200)}
.dash-card:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.08)}
.dash-card.plan{border-left-color:var(--plan)}.dash-card.do{border-left-color:var(--do)}
.dash-card.check{border-left-color:var(--check)}.dash-card.act{border-left-color:var(--act)}
.dash-card.done{background:#F0FDF4}
.dash-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.dash-step-no{font-size:11px;font-weight:700;color:var(--g500);text-transform:uppercase;letter-spacing:.05em}
.dash-status{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:600}
.st-todo{background:var(--g100);color:var(--g600)}.st-done{background:#D1FAE5;color:#065F46}
.dash-title{font-size:14px;font-weight:700;margin-bottom:3px}
.dash-desc{font-size:12px;color:var(--g600)}

/* Progress bar */
.prog-bar-outer{background:var(--g200);border-radius:4px;height:8px;flex:1;overflow:hidden}
.prog-bar-inner{height:100%;background:var(--do);border-radius:4px;transition:width .3s}
.prog-pct{font-size:13px;font-weight:700;color:var(--g700);width:36px;text-align:right}

/* Project meta edit */
.proj-meta{background:#fff;border-radius:10px;padding:16px;border:1px solid var(--g200);margin-bottom:16px}
.proj-meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* Helpers */
.flex{display:flex}.flex-center{display:flex;align-items:center}.flex-between{display:flex;justify-content:space-between;align-items:center}
.gap-1{gap:4px}.gap-2{gap:8px}.gap-3{gap:12px}
.mt-1{margin-top:4px}.mt-2{margin-top:8px}.mt-3{margin-top:12px}.mt-4{margin-top:16px}
.mb-1{margin-bottom:4px}.mb-2{margin-bottom:8px}.mb-3{margin-bottom:12px}
.text-sm{font-size:12px}.text-xs{font-size:11px}.text-gray{color:var(--g600)}
.fw-bold{font-weight:700}
.w-full{width:100%}
.hidden{display:none!important}
.divider{border:none;border-top:1px solid var(--g200);margin:14px 0}
.chip{display:inline-flex;align-items:center;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:600}
.chip-blue{background:#EFF6FF;color:#1D4ED8}.chip-green{background:#ECFDF5;color:#065F46}
.chip-yellow{background:#FFFBEB;color:#92400E}.chip-red{background:#FEF2F2;color:#991B1B}

@media(max-width:768px){
  .sidebar{transform:translateX(-100%);transition:transform .25s ease;position:fixed;top:0;left:0;height:100vh;z-index:200;width:260px;display:flex!important}
  .sidebar.open{transform:translateX(0)}
  .main{margin-left:0;max-width:100vw;padding:12px;padding-top:56px}
  .m4e1{grid-template-columns:repeat(2,1fr)}
  .kpt-grid{grid-template-columns:1fr}
  .dash-grid{grid-template-columns:1fr}
  .meta-row{grid-template-columns:1fr 1fr}
  .mobile-header{display:flex!important}
  .sidebar-overlay{display:block}
  .sidebar-overlay.active{opacity:1;pointer-events:auto}
  .gap-grid,.ba-grid{grid-template-columns:1fr}
  .gap-arrow{display:none}
  .ba-grid>div:nth-child(2){display:none}
  .proj-meta-grid{grid-template-columns:1fr}
  .r2col{grid-template-columns:1fr!important}
  .s03-flow-step{flex:0 0 calc(50% - 1px)}
  .page-hdr-info h2{font-size:18px}
  .step-nav{flex-wrap:wrap;gap:8px}
}
.mobile-header{display:none;position:fixed;top:0;left:0;right:0;height:48px;background:#fff;border-bottom:1px solid #E5E7EB;z-index:150;align-items:center;padding:0 16px;gap:12px}
.hamburger{background:none;border:none;cursor:pointer;padding:4px;display:flex;flex-direction:column;gap:5px}
.hamburger span{display:block;width:22px;height:2px;background:#374151;border-radius:2px}
.mobile-title{font-size:13px;font-weight:700;color:#111827;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:190;opacity:0;pointer-events:none;transition:opacity .25s}
@media print{
  .sidebar,.step-nav,.btn,.ex-toggle,.guide{display:none!important}
  .main{margin-left:0;padding:10px}
  .card{break-inside:avoid;box-shadow:none;border:1px solid #ccc}
  .page-hdr{margin-bottom:10px}
  textarea,input{border:none!important;background:transparent!important;padding:0!important}
}
</style>
</head>
<body>
<div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>
<header class="mobile-header">
  <button class="hamburger" onclick="toggleSidebar()" aria-label="メニュー">
    <span></span><span></span><span></span>
  </button>
  <div class="mobile-title" id="mobile-title">問題解決型ストーリーフォーマット</div>
</header>
<div class="app">
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <h1>問題解決型<br>ストーリーフォーマット</h1>
      <div class="subtitle" id="proj-name-display">プロジェクト名未設定</div>
    </div>
    <div class="sidebar-nav" id="sidebar-nav"></div>
    <div class="sidebar-footer">
      <div class="save-indicator" id="save-indicator">自動保存中...</div>
    </div>
  </nav>
  <main class="main" id="main-content">
    <div id="view-container"></div>
  </main>
</div>

<script>
// ============================================================
// STATE
// ============================================================
const STORAGE_KEY = 'pdca_format_v1';

function defaultState() {
  return {
    meta: { projectName: '', groupName: '' },
    currentView: 'dashboard',
    steps: {
      s01: { done: false, assignee: '', dueDate: '', notes: '', taskMeta: {}, problems: [] },
      s02: { done: false, assignee: '', dueDate: '', notes: '', taskMeta: {}, idealLabel: '', idealValue: '', currentLabel: '', currentValue: '', themeOverride: null },
      s03: { done: false, assignee: '', dueDate: '', notes: '', chartFocusL1: null, chartFocusL2: null, taskMeta: {},
        nodes: [
          { id: 'n1', name: '', value: '', important: false, children: [
            { id: 'n1-1', name: '', value: '', important: false, children: [] }
          ]},
          { id: 'n2', name: '', value: '', important: false, children: [] },
          { id: 'n3', name: '', value: '', important: false, children: [] },
          { id: 'n4', name: '', value: '', important: false, children: [] }
        ]
      },
      s04: { done: false, assignee: '', dueDate: '', notes: '', taskMeta: {},
        nodes: { 人: [], 機械: [], 材料: [], 方法: [], 環境: [] },
        rootCause: '', rootCauseEvidence: '',
        evidenceWizard: { method: '', target: '', finding: '' } },
      s05: { done: false, assignee: '', dueDate: '', notes: '', taskMeta: {}, what: '', byWhen: '', how: '' },
      s06: { done: false, assignee: '', dueDate: '', notes: '', taskMeta: {},
        nodes: { 人: [], 機械: [], 材料: [], 方法: [], 環境: [] },
        countermeasures: [] },
      report: { theme: '', significance: '', reason: '', policy: '', managerName: '', supporterName: '' },
      s07: { done: false, assignee: '', dueDate: '', notes: '', taskMeta: {},
        goalBefore: '', goalAfter: '', goalAchieved: null,
        tangible: '', intangible: '',
        themeBefore: '', themeAfter: '', themeAchieved: null },
      s08: { done: false, assignee: '', dueDate: '', notes: '', taskMeta: {},
        std: { when:'', where:'', who:'', what:'', how:'', why:'' },
        mgmt: { when:'', where:'', who:'', what:'', how:'', why:'' },
        keep: '', problem: '', tryNext: '' }
    },
    skill: { year: new Date().getFullYear().toString(), evaluationPhase: 'setup', members: [], history: [] }
  };
}

let S = loadState();

function migrateState(state) {
  const cats = ['人','機械','材料','方法','環境'];
  const s04 = state.steps && state.steps.s04;
  if (s04 && (!s04.nodes || Array.isArray(s04.nodes))) {
    s04.nodes = { 人:[], 機械:[], 材料:[], 方法:[], 環境:[] };
  }
  const s06 = state.steps && state.steps.s06;
  if (s06 && (!s06.nodes || Array.isArray(s06.nodes))) {
    s06.nodes = { 人:[], 機械:[], 材料:[], 方法:[], 環境:[] };
  }
  if (s06 && s06.countermeasures) {
    s06.countermeasures = s06.countermeasures.map(cm => {
      if (!cm.scores) cm.scores = { 効果:'', 実現:'', コスト:'', 定着:'' };
      if (cm.chosen === undefined) cm.chosen = false;
      if (cm.fromTree === undefined) cm.fromTree = false;
      if (cm.treeNodeId === undefined) cm.treeNodeId = '';
      if (cm.implAssignee === undefined) cm.implAssignee = '';
      if (cm.implStart === undefined) cm.implStart = '';
      if (cm.implEnd === undefined) cm.implEnd = '';
      if (cm.implNotes === undefined) cm.implNotes = '';
      if (cm.implHow === undefined) cm.implHow = '';
      return cm;
    });
  }
  if (state.steps && !state.steps.report) {
    state.steps.report = { theme: '', significance: '', reason: '', policy: '', managerName: '', supporterName: '' };
  }
  if (state.steps && state.steps.report) {
    const rep = state.steps.report;
    if (rep.reason === undefined) rep.reason = (rep.background||'') + (rep.rationale ? '\n' + rep.rationale : '');
    if (rep.policy === undefined) rep.policy = '';
    if (rep.managerName === undefined) rep.managerName = '';
    if (rep.supporterName === undefined) rep.supporterName = '';
    delete rep.background; delete rep.rationale;
  }
  if (!state.skill) state.skill = { year: new Date().getFullYear().toString(), evaluationPhase: 'setup', members: [], history: [] };
  if (!state.skill.history) state.skill.history = [];
  return state;
}

function loadState() {
  try {
    const s = localStorage.getItem(STORAGE_KEY);
    if (s) {
      const loaded = JSON.parse(s);
      const def = defaultState();
      return migrateState(deepMerge(def, loaded));
    }
  } catch(e) {}
  return defaultState();
}

function deepMerge(target, source) {
  const result = { ...target };
  for (const key of Object.keys(source)) {
    if (source[key] !== null && typeof source[key] === 'object' && !Array.isArray(source[key])) {
      result[key] = deepMerge(target[key] || {}, source[key]);
    } else {
      result[key] = source[key];
    }
  }
  return result;
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(S));
  const ind = document.getElementById('save-indicator');
  if (ind) { ind.textContent = '保存済み ✓'; setTimeout(() => { ind.textContent = '自動保存中...'; }, 1500); }
}

// ============================================================
// NAVIGATION
// ============================================================
const STEPS = [
  { id: 'dashboard', label: 'ダッシュボード', icon: '📊', phase: '' },
  { id: 'list', label: '担当者一覧', icon: '👥', phase: '' },
  { id: 'report', label: '現場長提出', icon: '📄', phase: '' },
  { id: 's01', label: '01_問題点の列挙', icon: '📋', phase: 'plan' },
  { id: 's02', label: '02_ギャップ分析', icon: '🔍', phase: 'plan' },
  { id: 's03', label: '03_データ絞り込み', icon: '🌿', phase: 'plan' },
  { id: 's04', label: '04_原因追及', icon: '🔬', phase: 'plan' },
  { id: 's05', label: '05_目標設定', icon: '🎯', phase: 'plan' },
  { id: 's06a', label: '06a_HOWツリー', icon: '🌿', phase: 'do' },
  { id: 's06b', label: '06b_対策評価', icon: '📊', phase: 'do' },
  { id: 's06c', label: '06c_実施計画', icon: '✅', phase: 'do' },
  { id: 's07', label: '07_効果の確認', icon: '📈', phase: 'check' },
  { id: 's08', label: '08_振り返り', icon: '🔄', phase: 'act' },
];

function toggleSidebar() {
  const sb = document.getElementById('sidebar');
  const ov = document.getElementById('sidebar-overlay');
  sb.classList.toggle('open');
  ov.classList.toggle('active');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('active');
}

function navigate(viewId, preserveScroll) {
  const scrollY = preserveScroll ? window.scrollY : 0;
  S.currentView = viewId;
  closeSidebar();
  renderSidebar();
  renderView();
  window.scrollTo(0, scrollY);
}

function renderSidebar() {
  const nav = document.getElementById('sidebar-nav');
  const projDisp = document.getElementById('proj-name-display');
  if (projDisp) projDisp.textContent = S.meta.projectName || 'プロジェクト名未設定';

  let html = '';
  let lastPhase = '';
  STEPS.forEach(step => {
    if (step.id === 'dashboard') {
      html += `<div class="nav-item ${S.currentView === 'dashboard' ? 'active' : ''}" onclick="navigate('dashboard')">${step.icon} ダッシュボード</div>`;
      return;
    }
    if (step.phase && step.phase !== lastPhase) {
      const labels = { plan: 'PLAN（計画）', do: 'DO（実施）', check: 'CHECK（確認）', act: 'ACT（改善）' };
      html += `<div class="nav-section">${labels[step.phase]}</div>`;
      lastPhase = step.phase;
    }
    const stateKey = step.id.startsWith('s06') ? 's06' : step.id;
    const done = S.steps[stateKey] && S.steps[stateKey].done;
    const active = S.currentView === step.id;
    const noStep = ['list','report'].includes(step.id);
    const dotLabel = step.id === 's06a' ? '6a' : step.id === 's06b' ? '6b' : step.id === 's06c' ? '6c' : step.id.replace('s','');
    html += `<div class="nav-item ${active ? 'active ' + (step.phase||'plan') : ''}" onclick="navigate('${step.id}')">
      ${noStep ? `<span style="width:22px;text-align:center">${step.icon}</span>` : `<span class="nav-dot ${done ? 'done' : ''}" style="${['s06a','s06b','s06c'].includes(step.id)?'font-size:9px':''}">${done ? '✓' : dotLabel}</span>`}
      ${step.label}
    </div>`;
  });
  html += `<div class="nav-section">🧑‍💼 能力向上</div>`;
  [
    { id:'skill_dashboard', label:'📊 チームダッシュボード' },
    { id:'skill_a1',        label:'🔍 A1 自己分析・目標' },
    { id:'skill_a2',        label:'🗺️ A2 役割理解' },
    { id:'skill_a3',        label:'🤝 A3 相互啓発' },
    { id:'skill_mid',       label:'📈 途中経過' },
    { id:'skill_peer',      label:'⭐ 他己評価入力' },
    { id:'skill_a4',        label:'🔄 A4 振り返り' },
  ].forEach(sv => {
    html += `<div class="nav-item ${S.currentView === sv.id ? 'active' : ''}" onclick="navigate('${sv.id}')">${sv.label}</div>`;
  });
  nav.innerHTML = html;
}

function renderView() {
  const container = document.getElementById('view-container');
  if (S.currentView === 'dashboard') {
    container.innerHTML = renderDashboard();
  } else if (S.currentView === 'list') {
    container.innerHTML = renderList();
  } else if (S.currentView === 'report') {
    container.innerHTML = renderReport();
  } else if (S.currentView === 's06a') {
    container.innerHTML = renderS06a();
  } else if (S.currentView === 's06b') {
    container.innerHTML = renderS06b();
  } else if (S.currentView === 's06c') {
    container.innerHTML = renderS06c();
  } else if (S.currentView === 'skill_dashboard') {
    container.innerHTML = renderSkillDashboard();
  } else if (S.currentView === 'skill_a1') {
    container.innerHTML = renderSkillA1();
  } else if (S.currentView === 'skill_a2') {
    container.innerHTML = renderSkillA2();
  } else if (S.currentView === 'skill_a3') {
    container.innerHTML = renderSkillA3();
  } else if (S.currentView === 'skill_mid') {
    container.innerHTML = renderSkillMid();
  } else if (S.currentView === 'skill_peer') {
    container.innerHTML = renderSkillPeer();
  } else if (S.currentView === 'skill_a4') {
    container.innerHTML = renderSkillA4();
  } else if (S.steps[S.currentView]) {
    const renders = { s01: renderS01, s02: renderS02, s03: renderS03, s04: renderS04, s05: renderS05, s07: renderS07, s08: renderS08 };
    if (renders[S.currentView]) container.innerHTML = renders[S.currentView]();
    else container.innerHTML = '<p>このステップはまだ準備中です。</p>';
  }
  attachHandlers();
}

// ============================================================
// UTILITIES
// ============================================================
function h(str) { return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function symScore(s) { return s === '◎' ? 9 : s === '○' ? 5 : s === '△' ? 3 : s === '×' ? 1 : 0; }

function calcScore(p) { return symScore(p.urgency) + symScore(p.importance) + symScore(p.impact) + symScore(p.topic); }

function getAutoTheme() {
  const s2 = S.steps.s02;
  if (!s2.idealLabel && !s2.idealValue) return '';
  const gap = Math.abs((parseFloat(s2.idealValue) || 0) - (parseFloat(s2.currentValue) || 0));
  if (s2.idealLabel && s2.currentValue && s2.idealValue) {
    return `${s2.idealLabel}を${gap}改善する`;
  }
  return s2.idealLabel || '';
}

function getTheme() {
  const s2 = S.steps.s02;
  if (s2.themeOverride != null) return s2.themeOverride;
  return getAutoTheme();
}

function symBtns(field, current, problemId, dupSyms) {
  const syms = ['×', '△', '○', '◎'];
  return `<div class="sym-sel">${syms.map(s => {
    const isSelected = current === s;
    const isDup = dupSyms && dupSyms.includes(s) && isSelected;
    return `<button class="sym-btn ${isSelected ? 's-' + s : ''} ${isDup ? 'dup-sym' : ''}" onclick="setSym('${problemId}','${field}','${s}')">${s}</button>`;
  }).join('')}</div>`;
}

// 縦方向（列ごと）の重複チェック
function checkDuplicates(problems) {
  const fields = ['urgency', 'importance', 'impact', 'topic'];
  const result = {}; // field -> [重複している記号リスト]
  fields.forEach(field => {
    const syms = problems.map(p => p[field]).filter(Boolean);
    const counts = {};
    syms.forEach(s => counts[s] = (counts[s] || 0) + 1);
    const dups = Object.keys(counts).filter(s => counts[s] > 1);
    if (dups.length) result[field] = dups;
  });
  return result;
}

}

function getTaskMeta(stepId, key) {

function stepNav(stepId) {
  const order = ['s01','s02','s03','s04','s05','s06a','s06b','s06c','s07','s08'];
  const idx = order.indexOf(stepId);
  const prev = idx > 0 ? order[idx - 1] : 'dashboard';
  const next = idx < order.length - 1 ? order[idx + 1] : null;
  const stateKey = stepId.startsWith('s06') ? 's06' : stepId;
  const step = S.steps[stateKey];
  return `<div class="step-nav">
    <button class="btn btn-outline" onclick="navigate('${prev}')">← 前へ</button>
    <label class="complete-toggle">
      <input type="checkbox" ${step.done ? 'checked' : ''} onchange="toggleDone('${stateKey}',this.checked)">
      このステップを完了にする

    ${next ? `<button class="btn btn-primary" onclick="navigate('${next}')">次へ →</button>` : '<button class="btn btn-success" onclick="navigate(\'dashboard\')">完了 🎉</button>'}
  </div>`;
}

// ============================================================
// BAR CHART HELPER
// ============================================================
function renderLevelChart(items, level, focusId, drillFn) {
  // items: array of nodes, level: 1|2|3, focusId: currently selected id, drillFn: 'setChartFocusL1'|'setChartFocusL2'|null
  if (!items || items.length === 0) return '<div class="chart-empty">項目がありません。ツリーでノードを追加してください。</div>';
  const valid = items.filter(n => n.name || Number(n.value) > 0);
  if (!valid.length) return '<div class="chart-empty">名称か値を入力するとグラフが表示されます</div>';

  const BAR_H = 34, GAP = 8, LBL_W = 150, BAR_MAX = 220, PAD = 4;
  const maxVal = Math.max(...valid.map(n => Number(n.value) || 0), 1);
  const maxNode = valid.reduce((a, b) => (Number(b.value) || 0) > (Number(a.value) || 0) ? b : a, valid[0]);
  const svgH = valid.length * (BAR_H + GAP) + PAD;
  const svgW = LBL_W + BAR_MAX + 100;

  const rows = valid.map((n, i) => {
    const val = Number(n.value) || 0;
    const bw = Math.round((val / maxVal) * BAR_MAX);
    const y = PAD / 2 + i * (BAR_H + GAP);
    const isMax = n.id === maxNode.id && val > 0;
    const isFocus = n.id === focusId;
    const hasKids = drillFn && (n.children || []).length > 0;
    const clr = isMax ? '#EF4444' : n.important ? '#F59E0B' : '#3B82F6';
    const lbl = h((n.name || '（未入力）').slice(0, 16));
    const focusHl = isFocus ? 'stroke="#3B82F6" stroke-width="2"' : '';
    const clickable = hasKids ? `onclick="${drillFn}('${n.id}')" style="cursor:pointer"` : '';
    return `<g transform="translate(0,${y})" ${clickable}>
      ${hasKids ? `<rect x="0" y="0" width="${svgW}" height="${BAR_H}" fill="transparent"/>` : ''}
      <text x="${LBL_W - 8}" y="${BAR_H / 2 + 5}" text-anchor="end" font-size="12" fill="${isMax ? '#B91C1C' : '#374151'}" font-weight="${isMax ? '700' : '400'}" font-family="Meiryo,sans-serif">${lbl}</text>
      <rect x="${LBL_W}" y="5" width="${Math.max(bw, val > 0 ? 3 : 0)}" height="${BAR_H - 10}" fill="${clr}" rx="4" opacity="${isMax ? 1 : 0.75}" ${focusHl}/>
      ${isMax ? `<text x="${LBL_W + 6}" y="${BAR_H / 2 + 5}" font-size="10" font-weight="800" fill="#fff" font-family="Meiryo,sans-serif">最多</text>` : ''}
      ${val > 0 ? `<text x="${LBL_W + bw + 7}" y="${BAR_H / 2 + 5}" font-size="12" font-weight="700" fill="#374151" font-family="Meiryo,sans-serif">${val}</text>` : ''}
      ${hasKids ? `<text x="${LBL_W + BAR_MAX + 10}" y="${BAR_H / 2 + 5}" font-size="11" fill="${isFocus ? '#059669' : '#3B82F6'}" font-family="Meiryo,sans-serif" font-weight="700">${isFocus ? '✔選択中' : '▶絞込'}</text>` : ''}
    </g>`;
  }).join('');

  return `<svg width="${svgW}" height="${svgH}" style="max-width:100%;overflow:visible;display:block">${rows}</svg>`;
}

// ============================================================
// STEP 03 - データ絞り込み
// ============================================================
function renderS03() {
  const step = S.steps.s03;
  const nodes = step.nodes || [];
  const focusL1Id = step.chartFocusL1 || null;
  const focusL2Id = step.chartFocusL2 || null;
  const theme = getTheme();

  // Determine L1 focus: user-selected or auto-max
  const l1Valid = nodes.filter(n => n.name || Number(n.value) > 0);
  const l1Max = l1Valid.length ? l1Valid.reduce((a, b) => (Number(b.value)||0) > (Number(a.value)||0) ? b : a, l1Valid[0]) : null;
  const effectiveFocusL1 = focusL1Id || (l1Max ? l1Max.id : null);
  const l1FocusNode = effectiveFocusL1 ? nodes.find(n => n.id === effectiveFocusL1) : null;

  // Determine L2 focus
  const l2Nodes = l1FocusNode ? (l1FocusNode.children || []) : [];
  const l2Valid = l2Nodes.filter(n => n.name || Number(n.value) > 0);
  const l2Max = l2Valid.length ? l2Valid.reduce((a, b) => (Number(b.value)||0) > (Number(a.value)||0) ? b : a, l2Valid[0]) : null;
  const effectiveFocusL2 = focusL2Id || (l2Max ? l2Max.id : null);
  const l2FocusNode = effectiveFocusL2 ? l2Nodes.find(n => n.id === effectiveFocusL2) : null;

  // L3 nodes
  const l3Nodes = l2FocusNode ? (l2FocusNode.children || []) : [];
  const l3Valid = l3Nodes.filter(n => n.name || Number(n.value) > 0);
  const l3Max = l3Valid.length ? l3Valid.reduce((a, b) => (Number(b.value)||0) > (Number(a.value)||0) ? b : a, l3Valid[0]) : null;

      <button class="btn btn-danger btn-xs" onclick="removeL3Node('${l1Id}','${l2Id}','${l3.id}')">×</button>

  const mkL2cards = (l1Id, l2arr) => l2arr.map((l2, i) => {
    const hasL3 = (l2.children||[]).length > 0;

      <div class="l2-card-hdr">
        <span class="clvl-badge clvl2" style="flex-shrink:0">L2</span>

        <div class="l2-inputs">
          <input type="text" value="${h(l2.name)}" oninput="setNodeField('${l1Id}','${l2.id}','','name',this.value)"
            placeholder="例：「緊急時に何を言っているかわからない」" style="flex:1;font-size:12px">
          <input type="number" value="${h(l2.value)}" oninput="setNodeField('${l1Id}','${l2.id}','','value',this.value)"

        <button class="imp-btn ${l2.important?'on':''}" onclick="toggleNodeImp('${l1Id}','${l2.id}','')" style="flex-shrink:0">★</button>

    return `

          <input type="text" value="${h(l1.name)}" oninput="setNodeField('${l1.id}','','','name',this.value)"
            placeholder="例：「放送」「車内対応」「接客」" style="flex:1;font-size:13px">

        <button class="btn btn-danger btn-xs" onclick="removeL1Node('${l1.id}')" style="flex-shrink:0">削除</button>

      <div class="l1-card-body">

  const hasL3data = nodes.some(n => (n.children||[]).some(c => (c.children||[]).some(g => g.name || Number(g.value)>0)));

  return `

  <div class="s03-flow">

      <div class="s03-flow-lbl">L1 大分類を入力</div>

  ${exBox('s03', `

      </div>
      <div class="l1-card-body">
        <div class="l1-connect">② この大分類の中の項目（中分類・L2）</div>

            <div class="ex-num">30</div>

            <div class="l2-connect">③ さらに細かく（詳細・L3）</div>
            <div class="l3-row"><span class="clvl-badge clvl3">L3</span><div class="ex-field" style="flex:1">音量が小さい</div><div class="ex-num">2</div></div>
            <div class="l3-row"><span class="clvl-badge clvl3">L3</span><div class="ex-field" style="flex:1">マイクの向きが悪い</div><div class="ex-num">1</div></div>
          </div>

        <div class="l2-card">
          <div class="l2-card-hdr">
            <span class="clvl-badge clvl2">L2</span>

function renderS04() {
  const step = S.steps.s04;
  const theme = getTheme();

  const cats = ['人', '機械', '材料', '方法', '環境'];
  const catIcons = { 人:'👤', 機械:'⚙️', 材料:'📦', 方法:'📋', 環境:'🏢' };

  const mkW3rows04 = (cat, w1Id, w2Id, w3arr) => (w3arr||[]).map(w3 => `

      <span class="clvl-badge clvl3" style="flex-shrink:0">Why③</span>
      <input type="text" value="${h(w3.name)}" oninput="setW04NodeField('${cat}','${w1Id}','${w2Id}','${w3.id}','name',this.value)"

      <button class="btn btn-danger btn-xs" onclick="removeW04L3('${cat}','${w1Id}','${w2Id}','${w3.id}')">×</button>
    </div>`).join('');

  const mkW2cards04 = (cat, w1Id, w2arr) => (w2arr||[]).map((w2, i) => `
    <div class="l2-card">
      <div class="l2-card-hdr">
        <span class="clvl-badge clvl2" style="flex-shrink:0">Why②</span>
        <span style="font-size:11px;font-weight:700;color:#5B21B6;flex-shrink:0">さらになぜ ${i+1}</span>
        <div class="l2-inputs">
          <input type="text" value="${h(w2.name)}" oninput="setW04NodeField('${cat}','${w1Id}','${w2.id}','','name',this.value)"

        <button class="imp-btn ${w2.important?'on':''}" onclick="toggleW04NodeImp('${cat}','${w1Id}','${w2.id}','')" style="flex-shrink:0">★</button>

      </div>
      <div class="l2-card-body">
        <div class="l2-connect">Why③ さらに「なぜ？」を深掘り</div>
        ${(w2.children||[]).length ? mkW3rows04(cat, w1Id, w2.id, w2.children) : ''}
        <button class="level-add-btn l3-add" onclick="addW04L3('${cat}','${w1Id}','${w2.id}')">＋ Why③を追加</button>

    </div>`).join('');

  const sectionsHtml = cats.map(cat => {
    const arr = (step.nodes||{})[cat] || [];
    const bodyHtml = arr.map((w1, i) => `
      <div class="l1-card" style="margin-bottom:8px">
        <div class="l1-card-hdr">
          <span class="clvl-badge clvl1" style="flex-shrink:0">Why①</span>
          <span style="font-size:11px;font-weight:700;color:#1D4ED8;flex-shrink:0">なぜ ${i+1}</span>

          </div>
          <button class="imp-btn ${w1.important?'on':''}" onclick="toggleW04NodeImp('${cat}','${w1.id}','','')" style="flex-shrink:0">★</button>
          <button class="btn btn-danger btn-xs" onclick="removeW04Node('${cat}','${w1.id}')" style="flex-shrink:0">削除</button>
        </div>
        <div class="l1-card-body">

// STEP 06b - メリット・デメリット評価
// ============================================================
function renderS06b() {
  const step = S.steps.s06;
  const scoreVal = {'◎':4,'○':3,'△':2,'×':1};
  const criteria = ['効果','実現','コスト','定着'];
  const scoredCms = step.countermeasures.map(cm => {
    const scores = cm.scores || {};
    const total = criteria.reduce((s,k) => s + (scoreVal[scores[k]]||0), 0);
    return { ...cm, scores, total };
  });
  const maxScore = scoredCms.length ? Math.max(...scoredCms.map(c=>c.total)) : 0;
  const cmRows = scoredCms.map(cm => {
    const isTop = cm.total > 0 && cm.total === maxScore;
    const rowClass = cm.chosen ? 'chosen-row' : (isTop ? 'top-row' : '');
    const critCells = criteria.map(crit => {
      const btns = ['◎','○','△','×'].map(sym =>
        `<button class="score-btn${cm.scores[crit]===sym?' sel-'+sym:''}" onclick="setCmScore('${cm.id}','${crit}','${sym}')">${sym}</button>`
      ).join('');
      return `<td class="td-crit"><div class="score-btns">${btns}</div></td>`;
    }).join('');
    return `
    <tr class="${rowClass}">
      <td class="td-left">
        <input type="text" value="${h(cm.name)}" onchange="setCm('${cm.id}','name',this.value)" placeholder="対策案を入力" style="margin-bottom:4px">
        <textarea onchange="setCm('${cm.id}','merit',this.value)" style="min-height:38px;font-size:11px" placeholder="メリット">${h(cm.merit)}</textarea>
        <textarea onchange="setCm('${cm.id}','demerit',this.value)" style="min-height:38px;font-size:11px;margin-top:2px" placeholder="デメリット">${h(cm.demerit)}</textarea>
        <textarea onchange="setCm('${cm.id}','solution',this.value)" style="min-height:38px;font-size:11px;margin-top:2px" placeholder="デメリット解消策">${h(cm.solution)}</textarea>
        ${cm.fromTree ? `<span class="tree-badge">★ツリー連動</span>` : ''}
      </td>
      ${critCells}
      <td style="text-align:center"><span class="total-score">${cm.total>0?cm.total:'-'}</span></td>
      <td style="text-align:center;white-space:nowrap">
        <button class="btn btn-sm ${cm.chosen?'btn-success':'btn-outline'}" onclick="toggleChosenCm('${cm.id}')" style="font-size:11px;padding:3px 8px">
          ${cm.chosen ? '✅ 採用中' : '採用'}
        </button>
        ${cm.chosen ? `<span class="chosen-badge">採用</span>` : ''}
        <br><button class="btn btn-danger btn-xs" onclick="removeCm('${cm.id}')" style="margin-top:4px">削除</button>
      </td>
    </tr>`;
  }).join('');

  return `
  <div class="page-hdr">
    <div class="page-icon do">📊</div>
    <div class="page-hdr-info">
      <div class="step-no">STEP 06b / DO</div>
      <h2>対策評価（メリット・デメリット）</h2>
      <div class="step-sub">各対策のメリット・デメリットを分析し、スコアで採用対策を決める</div>
    </div>
  </div>
  <div class="guide">
    <div class="guide-title">💡 このページでやること</div>
    <ul>
      <li>各対策のメリット・デメリットを分析し、デメリット解消策も考える</li>
      <li>◎/○/△/×で4項目（効果・実現・コスト・定着）を採点し、合計スコアが最も高い対策を「採用」する</li>
    </ul>
  </div>
  <div class="card">
    <div class="flex-between mb-3">
      <div class="card-title mb-0">対策案のメリット・デメリット評価</div>
      <button class="btn btn-primary btn-sm" onclick="addCm()">＋ 対策案を追加</button>
    </div>
    ${taskMetaRow('s06','t2')}
    ${step.countermeasures.length === 0 ? `<div class="text-sm text-gray" style="text-align:center;padding:20px">「＋ 対策案を追加」か、06aページで★をつけると自動追加されます</div>` : `
    <div style="overflow-x:auto">
      <table class="cm-matrix">
        <thead><tr>
          <th style="min-width:200px;text-align:left">対策案 / メリット・デメリット</th>
          <th class="td-crit">効果<br><span style="font-size:10px;font-weight:400">(解決)</span></th>

function syncW04RootCause() {
  const cats = ['人','機械','材料','方法','環境'];
  const starred = [];
  cats.forEach(cat => {
    (S.steps.s04.nodes[cat]||[]).forEach(w1 => {
      (w1.children||[]).forEach(w2 => {
        (w2.children||[]).forEach(w3 => { if (w3.important && w3.name) starred.unshift(w3.name); });
        if (w2.important && w2.name) starred.push(w2.name);
      });
      if (w1.important && w1.name) starred.push(w1.name);
    });
  });
  if (starred.length >= 1) S.steps.s04.rootCause = starred[0];
}

function generatePPT() {
  const pptxSrc = 'https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundled.js';
  function doGenerate() {
    const pptx = new PptxGenJS();
    pptx.layout = 'LAYOUT_WIDE';
    const proj = S.meta.projectName || 'プロジェクト名未設定';
    const group = S.meta.groupName || '';
    const theme = S.steps.report && S.steps.report.theme ? S.steps.report.theme : getTheme();
    const r = S.steps.report || {};
    const s05 = S.steps.s05;
    const s07 = S.steps.s07;
    const chosenCms = (S.steps.s06.countermeasures || []).filter(cm => cm.chosen);

    const BG_PLAN = 'EFF6FF', BG_DO = 'ECFDF5', BG_CHECK = 'FFFBEB', BG_ACT = 'FEF2F2';
    const CLR_DARK = '1F2937', CLR_GRAY = '6B7280', CLR_PLAN = '3B82F6';

    function addSlide(titleText, bg, fn) {
      const sl = pptx.addSlide();
      sl.background = { color: bg || 'FFFFFF' };
      sl.addText(titleText, { x:0.4, y:0.2, w:'90%', h:0.6, fontSize:20, bold:true, color:CLR_DARK, fontFace:'Meiryo' });
      sl.addShape(pptx.ShapeType.line, { x:0.4, y:0.85, w:12, h:0, line:{ color:CLR_PLAN, width:2 } });
      fn(sl);
      return sl;
    }

    const s01 = S.steps.s01; const s02 = S.steps.s02; const s03 = S.steps.s03; const s04 = S.steps.s04;
    const s08 = S.steps.s08;

    // Slide 1: タイトル
    const sl1 = pptx.addSlide();

function emptyScores() { return { 業務遂行力:0, 人材育成力:0, 組織活性化力:0, 課題設定変革力:0, 勤務態度:0 }; }

  };

function getSkill() {
  if (!S.skill) S.skill = { year: new Date().getFullYear().toString(), evaluationPhase:'setup', members:[], history:[] };
  if (!S.skill.history) S.skill.history = [];
  return S.skill;
}

function avgPeerScores(member) {
  const evals = member.peerEvals || [];
  if (!evals.length) return null;
  const result = {};
  SKILL_AXES.forEach(ax => {
    const vals = evals.map(e => e.scores[ax] || 0).filter(v => v > 0);
    result[ax] = vals.length ? vals.reduce((a,b)=>a+b,0)/vals.length : 0;
  });
  return result;
}

function computeTeamAvg() {
  const members = getSkill().members;
  if (!members.length) return null;
  const selfAvg = {};
  SKILL_AXES.forEach(ax => {
    const vals = members.map(m=>m.selfScores[ax]||0).filter(v=>v>0);
    selfAvg[ax] = vals.length ? vals.reduce((a,b)=>a+b,0)/vals.length : 0;
  });
  const selfCount = members.filter(m=>SKILL_AXES.some(ax=>(m.selfScores[ax]||0)>0)).length;
  const peerAvgList = members.map(m=>avgPeerScores(m)).filter(Boolean);
  let peerAvg = null;
  if (peerAvgList.length) {
    peerAvg = {};
    SKILL_AXES.forEach(ax => {
      const vals = peerAvgList.map(p=>p[ax]||0).filter(v=>v>0);
      peerAvg[ax] = vals.length ? vals.reduce((a,b)=>a+b,0)/vals.length : 0;
    });
    if (!SKILL_AXES.some(ax=>(peerAvg[ax]||0)>0)) peerAvg = null;
  }
  const peerCount = members.filter(m=>(m.peerEvals||[]).length>0).length;
  return { selfAvg, peerAvg, selfCount, peerCount, total: members.length };
}

// レーダーチャート SVG
function renderRadarChart(selfScores, peerScores, size) {
  size = size || 180;
  const N = SKILL_AXES.length;
  const cx = size/2, cy = size/2, r = size*0.32;
  const lblR = r + 30;

  function angleOf(i) { return 2*Math.PI*i/N - Math.PI/2; }

  const shortLabels = { '業務遂行力':'業務遂行力', '人材育成力':'人材育成力', '組織活性化力':'組織活性化', '課題設定変革力':'課題変革力', '勤務態度':'勤務態度' };

  const grid = [1,2,3,4,5].map(l => {
    const fr = l/5;
    const pts = SKILL_AXES.map((_,i)=>{const a=angleOf(i);return `${cx+r*fr*Math.cos(a)},${cy+r*fr*Math.sin(a)}`;}).join(' ');
    return `<polygon points="${pts}" fill="none" stroke="#E5E7EB" stroke-width="1"/>`;
  }).join('');

  const axes = SKILL_AXES.map((_,i)=>{
    const a=angleOf(i);
    return `<line x1="${cx}" y1="${cy}" x2="${cx+r*Math.cos(a)}" y2="${cy+r*Math.sin(a)}" stroke="#E5E7EB" stroke-width="1"/>`;
  }).join('');

  const lbls = SKILL_AXES.map((ax,i)=>{
    const a=angleOf(i);
    const lx=cx+lblR*Math.cos(a), ly=cy+lblR*Math.sin(a);
    return `<text x="${lx}" y="${ly}" text-anchor="middle" dominant-baseline="middle" font-size="9" fill="#374151" font-family="Meiryo,sans-serif">${shortLabels[ax]||ax}</text>`;
  }).join('');

  function poly(scores, color, dash) {
    const hasAny = SKILL_AXES.some(ax=>(scores[ax]||0)>0);
    if (!hasAny) return '';
    const pts = SKILL_AXES.map((ax,i)=>{
      const a=angleOf(i), v=Math.min(scores[ax]||0,5)/5;
      return `${cx+r*v*Math.cos(a)},${cy+r*v*Math.sin(a)}`;
    }).join(' ');
    return `<polygon points="${pts}" fill="${color}33" stroke="${color}" stroke-width="2" ${dash?'stroke-dasharray="5,3"':''}/>`;
  }
  function dots(scores, color) {
    return SKILL_AXES.map((ax,i)=>{
      if (!(scores[ax]||0)) return '';
      const a=angleOf(i), v=Math.min(scores[ax]||0,5)/5;
      return `<circle cx="${cx+r*v*Math.cos(a)}" cy="${cy+r*v*Math.sin(a)}" r="3.5" fill="${color}"/>`;
    }).join('');
  }

  const sp=poly(selfScores,'#3B82F6',false);
  const pp=peerScores?poly(peerScores,'#10B981',true):'';
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="max-width:100%;overflow:visible;display:block">
    ${grid}${axes}${lbls}${pp}${sp}
    ${pp?dots(peerScores,'#10B981'):''}${sp?dots(selfScores,'#3B82F6'):''}
  </svg>`;
}

function archiveCurrentYear() {
  const sk = getSkill();
  if (!sk.members.length) { alert('アーカイブするメンバーがいません'); return; }
  const yearNum = parseInt(sk.year, 10);
  if (isNaN(yearNum)) { alert('年度が正しく設定されていません'); return; }
  const newYear = (yearNum + 1).toString();
  if (!confirm(sk.year + '年度のデータを履歴に保存し、' + newYear + '年度を開始しますか？\n\n・評価スコア・コメントは履歴に保存されます\n・メンバーのスコアはリセットされます\n・メンバー氏名・役職は引き継がれます')) return;
  const snapshot = {
    year: sk.year,
    members: sk.members.map(m => {
      const pa = avgPeerScores(m);
      const hasYe = SKILL_AXES.some(ax=>(m.yearEndSelfScores[ax]||0)>0);
      return {
        id: m.id, name: m.name, role: m.role,
        selfScores: { ...m.selfScores },
        yearEndSelfScores: { ...m.yearEndSelfScores },
        displayScores: hasYe ? { ...m.yearEndSelfScores } : { ...m.selfScores },
        peerAvgScores: pa ? { ...pa } : {},
        peerCount: (m.peerEvals||[]).length,
        yearGoal: m.yearGoal, yearEndGoal: m.yearEndGoal, growthNote: m.growthNote
      };
    }),
    archivedAt: new Date().toISOString()
  };
  sk.history = (sk.history||[]).filter(h => h.year !== sk.year);
  sk.history.push(snapshot);
  sk.year = newYear;
  const cutoff = (yearNum - 1).toString();
  sk.history = sk.history.filter(h => h.year >= cutoff);
  sk.evaluationPhase = 'setup';
  sk.members = sk.members.map(m => ({
    ...m,
    strengths:'', weaknesses:'', yearGoal:'', goalApplication:'',
    selfScores: emptyScores(), growthPlan:'',
    learningFrom:'', sharing:'', roleGiven:'',
    midAchieved:'', midNotAchieved:'', midNextGoal:'',
    midScores: emptyScores(),
    yearEndSelfScores: emptyScores(),
    yearEndGoal:'', growthNote:'', peerEvals:[]
  }));
  saveState();
  navigate('skill_dashboard', true);
}

function renderPastYearsCard() {
  const sk = getSkill();
  const history = sk.history || [];
  if (!history.length) return '';
  const sorted = [...history].sort((a,b) => b.year.localeCompare(a.year));
  const items = sorted.map(rec => {
    const isOpen = _showPastYear === rec.year;
    const teamSelf = {};
    SKILL_AXES.forEach(ax => {
      const vals = rec.members.map(m => {
        const s = m.displayScores || m.yearEndSelfScores || m.selfScores || {};
        return (s[ax])||0;
      }).filter(v=>v>0);
      teamSelf[ax] = vals.length ? vals.reduce((a,b)=>a+b,0)/vals.length : 0;
    });
    const hasPeer = rec.members.some(m => m.peerAvgScores && SKILL_AXES.some(ax=>(m.peerAvgScores[ax]||0)>0));
    let teamPeer = null;
    if (hasPeer) {
      teamPeer = {};
      SKILL_AXES.forEach(ax => {
        const vals = rec.members.map(m=>(m.peerAvgScores&&m.peerAvgScores[ax])||0).filter(v=>v>0);
        teamPeer[ax] = vals.length ? vals.reduce((a,b)=>a+b,0)/vals.length : 0;
      });
    }
    let detailHtml = '';
    if (isOpen) {
      const axHeaders = SKILL_AXES.map(ax => `<th style="padding:5px 3px;text-align:center;border-bottom:1px solid var(--g200);font-size:10px">${ax.slice(0,4)}</th>`).join('');
      const tableRows = rec.members.map(m => {
        const ds = m.displayScores || m.yearEndSelfScores || m.selfScores || {};
        const cells = SKILL_AXES.map(ax => {
          const v = ds[ax]||0;
          const bg = v>=4?'#3B82F6':v>=3?'#10B981':v>=2?'#F59E0B':v>=1?'#EF4444':'#E5E7EB';
          const tc = v>=1?'#fff':'var(--g400)';
          return `<td style="padding:4px 3px;border-bottom:1px solid var(--g100);text-align:center"><span style="display:inline-flex;width:20px;height:20px;border-radius:50%;background:${bg};color:${tc};align-items:center;justify-content:center;font-weight:700;font-size:10px">${v||'—'}</span></td>`;
        }).join('');
        return `<tr><td style="padding:5px 8px;border-bottom:1px solid var(--g100);font-weight:600;font-size:12px">${h(m.name)}<div style="font-size:10px;color:var(--g500)">${h(m.role)}</div></td>${cells}<td style="padding:4px 3px;border-bottom:1px solid var(--g100);text-align:center;font-size:10px;color:var(--g500)">${m.peerCount?m.peerCount+'件':'—'}</td></tr>`;
      }).join('');
      const peerLegend = teamPeer ? `<span style="display:flex;align-items:center;gap:3px"><span style="display:inline-block;width:12px;height:0;border-top:2px dashed #10B981"></span>他己平均</span>` : '';
      detailHtml = `<div style="padding:14px;border-top:1px solid var(--g200)">
        <div class="r2col" style="display:grid;grid-template-columns:auto 1fr;gap:20px;align-items:start">
          <div style="display:flex;flex-direction:column;align-items:center">
            <div style="font-size:10px;color:var(--g500);margin-bottom:6px;font-weight:700">チーム平均（年末）</div>
            ${renderRadarChart(teamSelf, teamPeer, 170)}
            <div style="display:flex;gap:10px;margin-top:5px;font-size:10px;color:var(--g600)">
              <span style="display:flex;align-items:center;gap:3px"><span style="display:inline-block;width:12px;height:2px;background:#3B82F6"></span>自己評価</span>
              ${peerLegend}
            </div>
          </div>
          <div style="overflow-x:auto">
            <table style="width:100%;border-collapse:collapse;font-size:12px">
              <thead><tr style="background:var(--g100)">
                <th style="padding:5px 8px;text-align:left;border-bottom:1px solid var(--g200)">メンバー</th>
                ${axHeaders}
                <th style="padding:5px 3px;text-align:center;border-bottom:1px solid var(--g200);font-size:10px">他己</th>
              </tr></thead>
              <tbody>${tableRows}</tbody>
            </table>
            <div style="font-size:10px;color:var(--g400);margin-top:4px">※ 年末自己評価（未入力の場合は期初自己評価）</div>
          </div>
        </div>
      </div>`;
    }
    const date = new Date(rec.archivedAt).toLocaleDateString('ja-JP');
    return `<div style="border:1px solid var(--g200);border-radius:8px;margin-bottom:8px;overflow:hidden">
      <div style="display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--g50);cursor:pointer" onclick="togglePastYear('${rec.year}')">
        <span style="font-size:13px;font-weight:700">📅 ${rec.year}年度</span>
        <span style="font-size:11px;color:var(--g500)">${rec.members.length}名</span>
        <span style="font-size:11px;color:var(--g400)">保存日：${date}</span>
        <span style="margin-left:auto;font-size:12px;color:var(--g500)">${isOpen?'▲ 閉じる':'▼ 詳細を見る'}</span>
      </div>
      ${detailHtml}
    </div>`;
  }).join('');
  return `<div class="card">
    <div style="font-size:14px;font-weight:700;margin-bottom:12px">🗂 過去の記録（引き継ぎ参照用）</div>
    ${items}
  </div>`;
}

function renderTeamAvgCard() {
  const avg = computeTeamAvg();
  if (!avg || avg.selfCount === 0) return '';
  const hasPeer = avg.peerAvg !== null;
  const rows = SKILL_AXES.map(ax => {
    const sv = avg.selfAvg[ax]||0;
    const pv = hasPeer ? (avg.peerAvg[ax]||0) : 0;
    const selfCell = `<td style="padding:6px 10px;border-bottom:1px solid var(--g100);text-align:center">
      <div style="font-weight:700;color:#3B82F6">${sv?sv.toFixed(1):'—'}</div>
      ${sv?`<div style="height:3px;background:var(--g200);border-radius:2px;margin-top:3px"><div style="height:3px;background:#3B82F6;border-radius:2px;width:${(sv/5*100).toFixed(0)}%"></div></div>`:''}
    </td>`;
    const peerCell = hasPeer ? `<td style="padding:6px 10px;border-bottom:1px solid var(--g100);text-align:center">
      <div style="font-weight:700;color:#10B981">${pv?pv.toFixed(1):'—'}</div>
      ${pv?`<div style="height:3px;background:var(--g200);border-radius:2px;margin-top:3px"><div style="height:3px;background:#10B981;border-radius:2px;width:${(pv/5*100).toFixed(0)}%"></div></div>`:''}
    </td>` : '';
    return `<tr><td style="padding:6px 10px;border-bottom:1px solid var(--g100);font-weight:600;font-size:12px">${ax}</td>${selfCell}${peerCell}</tr>`;
  }).join('');
  const peerHead = hasPeer ? `<th style="padding:6px 10px;text-align:center;border-bottom:1px solid var(--g200);color:#10B981;font-size:11px">他己平均</th>` : '';
  return `<div class="card">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px">
      <span style="font-size:14px;font-weight:700">📊 チーム全体 平均スコア</span>
      <span style="font-size:11px;color:var(--g500)">${avg.selfCount}/${avg.total}名 自己評価入力済み${hasPeer?'　/ 他己評価 '+avg.peerCount+'名分集計':'　/ 他己評価：未集計'}</span>
    </div>
    <div class="r2col" style="display:grid;grid-template-columns:auto 1fr;gap:24px;align-items:center">
      <div style="display:flex;flex-direction:column;align-items:center">
        ${renderRadarChart(avg.selfAvg, avg.peerAvg, 220)}
        <div style="display:flex;gap:14px;margin-top:8px;font-size:10px;color:var(--g600)">
          <span style="display:flex;align-items:center;gap:3px"><span style="display:inline-block;width:14px;height:2px;background:#3B82F6"></span>自己評価平均</span>
          ${hasPeer?`<span style="display:flex;align-items:center;gap:3px"><span style="display:inline-block;width:14px;height:0;border-top:2px dashed #10B981"></span>他己評価平均</span>`:`<span style="color:var(--g400)">他己評価：未集計</span>`}
        </div>
      </div>
      <table style="width:100%;border-collapse:collapse">
        <thead><tr style="background:var(--g100)">
          <th style="padding:6px 10px;text-align:left;border-bottom:1px solid var(--g200);font-size:11px">能力軸</th>
          <th style="padding:6px 10px;text-align:center;border-bottom:1px solid var(--g200);color:#3B82F6;font-size:11px">自己平均</th>
          ${peerHead}
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  </div>`;
}

  _skillMemberId = id;

  const dest = targets.includes(S.currentView) ? S.currentView : 'skill_a1';
  navigate(dest, false);
}

function renderSkillA1() {
  const sk = getSkill();
  if (!_skillMemberId && sk.members.length) _skillMemberId = sk.members[0].id;
  const m = sk.members.find(x=>x.id===_skillMemberId);
  return `
  <div class="page-hdr">

}

}

// ---- スキルモジュール イベントハンドラ ----
function setSkillMeta(key, val) {
  getSkill()[key] = val;
  saveState();
  navigate(S.currentView, true);
}

function openAddMemberForm() {
  const el = document.getElementById('add-member-form');
  if (el) { el.classList.remove('hidden'); setTimeout(()=>document.getElementById('new-member-name').focus(),50); }
}

function addSkillMember() {
  const name = (document.getElementById('new-member-name').value||'').trim();
  const role = (document.getElementById('new-member-role').value||'').trim();
  if (!name) { alert('名前を入力してください'); return; }
  getSkill().members.push(defaultMember(name, role));
  saveState();
  navigate('skill_dashboard', true);
}

function removeSkillMember(id) {
  if (!confirm('このメンバーを削除しますか？')) return;
  const sk = getSkill();
  sk.members = sk.members.filter(m=>m.id!==id);
  if (_skillMemberId === id) _skillMemberId = '';
  saveState();
  navigate('skill_dashboard', true);
}

function setSkillField(memberId, field, val) {
  const m = getSkill().members.find(x=>x.id===memberId);
  if (m) { m[field] = val; saveState(); }
}

function setSkillScore(memberId, field, axis, val) {
  const m = getSkill().members.find(x=>x.id===memberId);
  if (!m) return;
  if (!m[field]) m[field] = emptyScores();
  m[field][axis] = m[field][axis] === val ? 0 : val;
  saveState();
  navigate(S.currentView, true);
}

function setPeerEvalField(key, val) {
  _peerEval[key] = val;
  if (key === 'evaluatorId') { _peerEval.evaluateeId = ''; _peerEval.scores = emptyScores(); }
  navigate('skill_peer', true);
}

function setPeerScore(axis, val) {
  _peerEval.scores[axis] = _peerEval.scores[axis] === val ? 0 : val;
  navigate('skill_peer', true);
}

function submitPeerEval() {
  const { evaluatorId, evaluateeId, scores, comment } = _peerEval;
  if (!evaluatorId || !evaluateeId) { alert('評価者と被評価者を選択してください'); return; }
  const target = getSkill().members.find(m=>m.id===evaluateeId);
  if (!target) return;
  if (!target.peerEvals) target.peerEvals = [];
  const idx = target.peerEvals.findIndex(e=>e.evaluatorId===evaluatorId);
  const data = { evaluatorId, scores:{...scores}, comment, at: new Date().toISOString() };
  if (idx>=0) target.peerEvals[idx]=data; else target.peerEvals.push(data);
  saveState();
  _peerEval = { evaluatorId, evaluateeId:'', scores:emptyScores(), comment:'' };
  alert('他己評価を送信しました！');
  navigate('skill_peer', true);
}

// ============================================================
// INIT
// ============================================================
function init() {
  renderSidebar();
  navigate(S.currentView || 'dashboard');
}

init();
</script>
